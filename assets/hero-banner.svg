<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0B1020"/>
      <stop offset="55%" stop-color="#101A33"/>
      <stop offset="100%" stop-color="#0C162C"/>
    </linearGradient>
    <radialGradient id="glow1" cx="900" cy="220" r="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#14B8A6" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="220" cy="280" r="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="termBg" x1="660" y1="60" x2="660" y2="365" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#162038"/>
      <stop offset="100%" stop-color="#10192B"/>
    </linearGradient>
    <linearGradient id="termBorder" x1="660" y1="60" x2="660" y2="365" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#24314F"/>
      <stop offset="100%" stop-color="#182238"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.025" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="1200" height="400" fill="url(#bg)"/>
  <rect width="1200" height="400" fill="url(#grid)"/>
  <rect width="1200" height="400" fill="url(#glow1)"/>
  <rect width="1200" height="400" fill="url(#glow2)"/>

  <circle cx="110" cy="78" r="1.6" fill="#14B8A6" opacity="0.25"/>
  <circle cx="175" cy="56" r="1.2" fill="#60A5FA" opacity="0.2"/>
  <circle cx="1080" cy="70" r="1.2" fill="#93C5FD" opacity="0.18"/>
  <circle cx="1125" cy="340" r="1.8" fill="#2DD4BF" opacity="0.22"/>

  <g transform="translate(80, 110)">
    <rect x="0" y="0" width="56" height="56" rx="14" fill="#14B8A6" opacity="0.12"/>
    <text x="28" y="36" font-family="SF Mono, Menlo, Consolas, monospace" font-size="28" fill="#2DD4BF" text-anchor="middle" font-weight="600">ST</text>
    <text x="72" y="25" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="36" fill="#F8FAFC" font-weight="700" letter-spacing="-0.5">sensortower</text>
    <text x="72" y="48" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#64748B" font-weight="500" letter-spacing="3">CLI</text>
  </g>

  <text x="80" y="210" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="17" fill="#94A3B8">
    Sensor Tower from your terminal.
  </text>
  <text x="80" y="236" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="17" fill="#94A3B8">
    iOS market data. JSON-first. Agent-ready.
  </text>

  <g transform="translate(80, 268)">
    <rect x="0" y="0" width="98" height="28" rx="14" fill="#14B8A6" opacity="0.12" stroke="#14B8A6" stroke-opacity="0.22" stroke-width="1"/>
    <text x="49" y="18" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#2DD4BF" text-anchor="middle" font-weight="500">Go · iOS API</text>
    <rect x="108" y="0" width="118" height="28" rx="14" fill="#3B82F6" opacity="0.12" stroke="#3B82F6" stroke-opacity="0.22" stroke-width="1"/>
    <text x="167" y="18" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#93C5FD" text-anchor="middle" font-weight="500">public endpoints</text>
    <rect x="236" y="0" width="104" height="28" rx="14" fill="#10B981" opacity="0.12" stroke="#10B981" stroke-opacity="0.22" stroke-width="1"/>
    <text x="288" y="18" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#6EE7B7" text-anchor="middle" font-weight="500">json output</text>
  </g>

  <line x1="80" y1="320" x2="440" y2="320" stroke="#1E293B" stroke-width="1"/>
  <text x="80" y="348" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" fill="#475569">github.com/FerdiKT/sensortower-cli</text>

  <g transform="translate(500, 40)">
    <rect x="0" y="0" width="640" height="345" rx="12" fill="url(#termBorder)"/>
    <rect x="1" y="1" width="638" height="343" rx="11" fill="url(#termBg)"/>
    <rect x="1" y="1" width="638" height="36" rx="11" fill="#1B2540"/>
    <rect x="1" y="26" width="638" height="11" fill="#1B2540"/>
    <circle cx="22" cy="19" r="6" fill="#FF5F57"/>
    <circle cx="42" cy="19" r="6" fill="#FEBC2E"/>
    <circle cx="62" cy="19" r="6" fill="#28C840"/>
    <text x="320" y="23" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12" fill="#64748B" text-anchor="middle">sensortower — zsh</text>
    <line x1="1" y1="37" x2="639" y2="37" stroke="#2B3858" stroke-width="0.5"/>

    <g transform="translate(24, 58)">
      <text y="0" font-family="SF Mono, Menlo, Consolas, monospace" font-size="13">
        <tspan fill="#6B7280">$</tspan>
        <tspan fill="#E2E8F0"> sensortower publishers apps </tspan>
        <tspan fill="#FBBF24">--publisher-id 1619264551</tspan>
      </text>

      <text y="26" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12.5" fill="#2DD4BF">app_id      name               downloads   revenue</text>
      <text y="46" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12.5" fill="#94A3B8">6478631467  Playlist Transfer  10k         $60k</text>
      <text y="66" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12.5" fill="#94A3B8">6503964127  Jiggle             9k          &lt; $5k</text>
      <text y="86" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12.5" fill="#94A3B8">6498791435  Music Finder       9k          $20k</text>

      <text y="124" font-family="SF Mono, Menlo, Consolas, monospace" font-size="13">
        <tspan fill="#6B7280">$</tspan>
        <tspan fill="#E2E8F0"> sensortower charts category-rankings </tspan>
        <tspan fill="#FBBF24">--date 2026-04-16</tspan>
      </text>

      <text y="148" x="0" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12.5" fill="#94A3B8">{</text>
      <text y="166" x="0" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12.5" xml:space="preserve"><tspan fill="#94A3B8">  "</tspan><tspan fill="#7DD3FC">data</tspan><tspan fill="#94A3B8">": {</tspan></text>
      <text y="184" x="0" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12.5" xml:space="preserve"><tspan fill="#94A3B8">    "</tspan><tspan fill="#7DD3FC">free</tspan><tspan fill="#94A3B8">": [{ "</tspan><tspan fill="#7DD3FC">rank</tspan><tspan fill="#94A3B8">": </tspan><tspan fill="#6EE7B7">1</tspan><tspan fill="#94A3B8">, "</tspan><tspan fill="#7DD3FC">name</tspan><tspan fill="#94A3B8">": "</tspan><tspan fill="#A5F3FC">ChatGPT</tspan><tspan fill="#94A3B8">" }],</tspan></text>
      <text y="202" x="0" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12.5" xml:space="preserve"><tspan fill="#94A3B8">    "</tspan><tspan fill="#7DD3FC">grossing</tspan><tspan fill="#94A3B8">": [{ "</tspan><tspan fill="#7DD3FC">rank</tspan><tspan fill="#94A3B8">": </tspan><tspan fill="#6EE7B7">1</tspan><tspan fill="#94A3B8">, "</tspan><tspan fill="#7DD3FC">name</tspan><tspan fill="#94A3B8">": "</tspan><tspan fill="#A5B4FC">Disney+</tspan><tspan fill="#94A3B8">" }],</tspan></text>
      <text y="220" x="0" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12.5" xml:space="preserve"><tspan fill="#94A3B8">    "</tspan><tspan fill="#7DD3FC">paid</tspan><tspan fill="#94A3B8">": [{ "</tspan><tspan fill="#7DD3FC">rank</tspan><tspan fill="#94A3B8">": </tspan><tspan fill="#6EE7B7">1</tspan><tspan fill="#94A3B8">, "</tspan><tspan fill="#7DD3FC">name</tspan><tspan fill="#94A3B8">": "</tspan><tspan fill="#A5B4FC">Procreate Pocket</tspan><tspan fill="#94A3B8">" }]</tspan></text>
      <text y="238" x="0" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12.5" xml:space="preserve"><tspan fill="#94A3B8">  },</tspan></text>
      <text y="256" x="0" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12.5" xml:space="preserve"><tspan fill="#94A3B8">  "</tspan><tspan fill="#7DD3FC">date</tspan><tspan fill="#94A3B8">": "</tspan><tspan fill="#FCA5A5">2026-04-16</tspan><tspan fill="#94A3B8">"</tspan></text>
      <text y="274" x="0" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12.5" fill="#94A3B8">}</text>
    </g>
  </g>
</svg>
